name: Publish to ClawhHub

on:
  push:
    branches: [master]
    paths-ignore:
      - '.github/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawhHub CLI
        run: npm install -g clawhub

      - name: Authenticate
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }} --no-browser

      - name: Resolve next version
        id: version
        run: |
          CURRENT=$(clawhub inspect sigaa 2>/dev/null | grep "Latest:" | awk '{print $2}' || echo "1.0.0")
          if [ -z "$CURRENT" ] || [ "$CURRENT" = "Latest:" ]; then CURRENT="1.0.0"; fi
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT"

      - name: Publish skill
        run: |
          clawhub publish . --slug sigaa --name "SIGAA" --version ${{ steps.version.outputs.next }} --no-input
