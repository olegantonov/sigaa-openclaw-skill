name: Publish to ClawhHub

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawhHub CLI
        run: npm install -g clawhub

      - name: Authenticate
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }} --no-browser

      - name: Publish skill
        run: clawhub publish . --slug sigaa --name "SIGAA" --no-input
